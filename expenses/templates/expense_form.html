{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="mb-3">{{ action }} Expense</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
          </div>
        {% endfor %}
        <div class="d-flex gap-2">
          <button class="btn btn-success" type="submit">💾 Save</button>
          <a href="/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  input, select { display: block; width: 100%; padding: .375rem .75rem;
    border: 1px solid #ced4da; border-radius: .375rem; font-size: 1rem; }
  input:focus, select:focus { outline: none; border-color: #86b7fe; box-shadow: 0 0 0 .25rem rgba(13,110,253,.25); }
</style>
{% endblock %}
