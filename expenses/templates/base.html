<!DOCTYPE html>
<html>
<head>
  <title>Smart Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: bold; font-size: 1.3rem; }
    .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="/">💰 Expense Tracker</a>
  {% if user.is_authenticated %}
  <div>
    <a class="btn btn-success btn-sm me-1" href="/add/">Add Expense</a>
    <a class="btn btn-warning btn-sm me-1" href="/export/csv/">CSV</a>
    <a class="btn btn-danger btn-sm me-1" href="/export/pdf/">PDF</a>
    <a class="btn btn-secondary btn-sm" href="/logout/">Logout</a>
  </div>
  {% endif %}
</nav>

<div class="container mt-4">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
