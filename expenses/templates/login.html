{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h3 class="mb-3">Login</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            <input class="form-control" type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" {% if field.value %}value="{{ field.value }}"{% endif %}>
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
        {% endfor %}
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
      <p class="mt-3 text-center">No account? <a href="/signup/">Create account</a></p>
    </div>
  </div>
</div>
{% endblock %}
